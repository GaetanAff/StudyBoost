<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBoost - IA pour la Révision</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>StudyBoost</h1>
                </div>
                <div class="header-actions">
                    <button id="apiKeyBtn" class="btn-secondary">
                        <i class="fas fa-key"></i> Clé API
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section" id="uploadSection">
                <div class="upload-card">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <h2>Uploadez vos documents</h2>
                    <p>PDF, Word, PowerPoint, Images (OCR)</p>
                    
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png" hidden>
                        <div class="upload-placeholder">
                            <i class="fas fa-plus"></i>
                            <span>Cliquez ou glissez vos fichiers ici</span>
                        </div>
                    </div>
                    
                    <div class="progress-bar" id="progressBar" style="display: none;">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </section>

            <!-- Content Processing -->
            <section class="content-section" id="contentSection" style="display: none;">
                <div class="document-info">
                    <h3 id="documentTitle">Document traité</h3>
                    <div class="document-stats">
                        <span id="wordCount">0 mots</span>
                        <span id="pageCount">0 pages</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-grid">
                    <button class="action-card" data-action="summary_short">
                        <i class="fas fa-compress-alt"></i>
                        <h4>Résumé Court</h4>
                        <p>Version condensée rapide</p>
                    </button>

                    <button class="action-card" data-action="summary_long">
                        <i class="fas fa-list-ul"></i>
                        <h4>Résumé Détaillé</h4>
                        <p>Structuré et complet</p>
                    </button>

                    <button class="action-card" data-action="qcm">
                        <i class="fas fa-question-circle"></i>
                        <h4>QCM</h4>
                        <p>Questions à choix multiples</p>
                    </button>

                    <button class="action-card" data-action="flashcards">
                        <i class="fas fa-cards-blank"></i>
                        <h4>Flashcards</h4>
                        <p>Cartes de révision</p>
                    </button>

                    <button class="action-card" data-action="revision_sheet">
                        <i class="fas fa-file-alt"></i>
                        <h4>Fiche de Révision</h4>
                        <p>Fiche complète et design</p>
                    </button>

                    <button class="action-card" data-action="question">
                        <i class="fas fa-comments"></i>
                        <h4>Poser une Question</h4>
                        <p>Questions libres sur le contenu</p>
                    </button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h3 id="resultsTitle">Résultats</h3>
                    <div class="results-actions">
                        <button id="exportBtn" class="btn-secondary">
                            <i class="fas fa-download"></i> Exporter
                        </button>
                        <button id="newAnalysisBtn" class="btn-primary">
                            <i class="fas fa-plus"></i> Nouvelle Analyse
                        </button>
                    </div>
                </div>
                <div class="results-content" id="resultsContent"></div>
            </section>
        </main>

        <!-- Modals -->
        <!-- API Key Modal -->
        <div class="modal" id="apiKeyModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Configuration API Gemini</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Clé API Google Gemini</label>
                        <input type="password" id="apiKeyInput" placeholder="Entrez votre clé API Gemini">
                        <small>Obtenez votre clé sur <a href="https://makersuite.google.com/app/apikey" target="_blank">Google AI Studio</a></small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="saveApiKey" class="btn-primary">Sauvegarder</button>
                </div>
            </div>
        </div>

        <!-- Question Modal -->
        <div class="modal" id="questionModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Poser une Question</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Votre question sur le document</label>
                        <textarea id="questionInput" placeholder="Posez votre question..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="submitQuestion" class="btn-primary">Poser la Question</button>
                </div>
            </div>
        </div>

        <!-- Options Modal -->
        <div class="modal" id="optionsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="optionsTitle">Options</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="optionsBody">
                    <!-- Dynamic content based on action -->
                </div>
                <div class="modal-footer">
                    <button id="confirmOptions" class="btn-primary">Générer</button>
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="loadingText">Traitement en cours...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
